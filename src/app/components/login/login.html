<div class="login-page">

  <!-- ── Pannello brand (sx) ── -->
  <div class="brand-panel">
    <div class="brand-wordmark">
      <span class="brand-top">PHOTO</span>
      <span class="brand-bot">MAT</span>
    </div>
    <p class="brand-tagline">Archivio fotografico personale</p>
    <div class="brand-rule"></div>
  </div>

  <!-- ── Pannello form (dx) ── -->
  <div class="form-panel">
    <button class="theme-toggle" (click)="themeService.cycle()" [attr.aria-label]="'Tema: ' + themeService.theme()">
      @if (themeService.theme() === 'default') {
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      }
    </button>

    <div class="form-inner">
      <h2 class="form-heading">Accesso</h2>
      <p class="form-sub">Area riservata all'amministratore</p>

      <form class="login-form" (ngSubmit)="submit()">
        <div class="field">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            autocomplete="username"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            name="username"
            [disabled]="loading()" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            [disabled]="loading()" />
        </div>

        @if (error()) {
          <p class="error-msg">{{ error() }}</p>
        }

        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span>
          } @else {
            Accedi
          }
        </button>
      </form>
    </div>
  </div>

</div>
