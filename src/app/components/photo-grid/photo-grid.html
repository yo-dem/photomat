<header class="navbar">
  <span class="logo">PhotoMat</span>
  <button class="upload-btn" (click)="triggerUpload()" aria-label="Upload photo">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="4" ry="4" />
      <line x1="12" y1="8" x2="12" y2="16" />
      <line x1="8" y1="12" x2="16" y2="12" />
    </svg>
  </button>
  <input #fileInput type="file" accept="image/*" hidden (change)="onFileSelected($event)" />
</header>

@if (photoService.photos().length === 0) {
  <div class="empty-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="62" height="62" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
      <circle cx="12" cy="13" r="4" />
    </svg>
    <p>Nessuna foto ancora.</p>
    <button class="empty-upload-btn" (click)="triggerUpload()">Carica la tua prima foto</button>
  </div>
} @else {
  <div class="photo-grid">
    @for (photo of photoService.photos(); track photo.id) {
      <div class="photo-cell">
        <img [src]="photo.dataUrl" [alt]="photo.name" loading="lazy" />
      </div>
    }
  </div>
}
