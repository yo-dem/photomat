<header class="navbar">
  <a class="logo" routerLink="/">
    <span class="logo-top">PHOTO</span>
    <span class="logo-bot">MAT</span>
  </a>
  <div class="navbar-actions">
    <button class="theme-btn" (click)="themeService.cycle()" [attr.aria-label]="'Tema: ' + themeService.theme()">
      @if (themeService.theme() === 'default') {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      }
    </button>

    @if (auth.isAuthenticated()) {
      <a class="profile-btn" [routerLink]="'/me'" aria-label="Il mio profilo">
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>
      <button class="logout-btn" (click)="logout()" aria-label="Esci">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    } @else {
      <a class="login-btn" routerLink="/login" aria-label="Accedi">
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </a>
    }
  </div>
</header>

<!-- Lightbox -->
@if (selectedEntry()) {
  <div class="lightbox-overlay" (click)="closeEntry()">
    <button class="lightbox-close" (click)="closeEntry()" aria-label="Chiudi">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <div class="lightbox-content" (click)="$event.stopPropagation()">
      <img class="lightbox-img" [src]="selectedEntry()!.dataUrl" [alt]="selectedEntry()!.owner" />
      <p class="lightbox-caption">
        <a class="lightbox-owner-link" [routerLink]="'/u/' + selectedEntry()!.owner" (click)="closeEntry()">
          &#64;{{ selectedEntry()!.owner }}
        </a>
      </p>
    </div>
  </div>
}

<!-- Bacheca grid -->
@if (bachekaService.activeEntries().length === 0) {
  <div class="empty-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="62" height="62" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
      <circle cx="12" cy="13" r="4" />
    </svg>
    <p>Nessuna foto in bacheca ancora.</p>
  </div>
} @else {
  <div class="bacheca-grid">
    @for (entry of bachekaService.activeEntries(); track entry.id) {
      <div
        class="bacheca-cell"
        [style.opacity]="bachekaService.getOpacity(entry)"
        (click)="openEntry(entry)">
        <img [src]="entry.dataUrl" [alt]="entry.owner" loading="lazy" />
        <div class="bacheca-cell-overlay">
          <a class="bacheca-owner"
            [routerLink]="'/u/' + entry.owner"
            (click)="$event.stopPropagation()">
            &#64;{{ entry.owner }}
          </a>
        </div>
      </div>
    }
  </div>
}
